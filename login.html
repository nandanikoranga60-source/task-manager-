<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeHub — Sign in</title>
  <style>
    :root {
      --bg: #eef2f0; --card: #ffffff; --text: #16211c; --muted: #647069; --border: #e2e8e5;
      --accent: #2e9e6b; --accent-hover: #24784f; --danger: #c0392b;
      --shadow: 0 10px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0e1512; --card: #18211d; --text: #e7efe9; --muted: #93a79c; --border: #26332c;
        --accent: #34c47f; --accent-hover: #47d791; --danger: #f2726a; --shadow: 0 10px 40px rgba(0,0,0,0.4); }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      background: radial-gradient(1200px 600px at 50% -10%, color-mix(in srgb, var(--accent) 22%, var(--bg)), var(--bg)); }
    .wrap { width: 100%; max-width: 400px; }
    .brand { text-align: center; margin-bottom: 1.25rem; }
    .brand .logo { font-size: 2.2rem; }
    .brand h1 { font-size: 1.5rem; font-weight: 800; margin-top: 0.2rem; letter-spacing: -0.02em; }
    .brand p { color: var(--muted); font-size: 0.9rem; margin-top: 0.15rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; box-shadow: var(--shadow); }
    .tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 0.25rem; margin-bottom: 1.2rem; }
    .tabs button { flex: 1; font: inherit; font-weight: 600; cursor: pointer; border: none; background: transparent;
      color: var(--muted); padding: 0.5rem; border-radius: 8px; }
    .tabs button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin: 0.7rem 0 0.3rem; }
    input { width: 100%; font: inherit; padding: 0.65rem 0.75rem; border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg); color: var(--text); outline: none; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; font: inherit; font-weight: 700; cursor: pointer; border: none; color: #fff;
      background: var(--accent); padding: 0.75rem; border-radius: 10px; margin-top: 1.1rem; transition: background 0.15s; }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .msg { font-size: 0.85rem; margin-top: 0.9rem; padding: 0.6rem 0.75rem; border-radius: 9px; display: none; }
    .msg.show { display: block; }
    .msg.err { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
    .msg.ok { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); }
    .foot { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 1.1rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">🩺</div>
      <h1>LifeHub</h1>
      <p>Your money, health &amp; everyday tools — in one place.</p>
    </div>
    <div class="card">
      <div class="tabs">
        <button id="tab-login" class="active" type="button">Log in</button>
        <button id="tab-signup" type="button">Sign up</button>
      </div>
      <form id="form" autocomplete="on">
        <div id="name-field" style="display:none">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name" autocomplete="name" />
        </div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="current-password" required />
        <button class="btn" id="submit" type="submit">Log in</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
    <p class="foot">Demo login — your account is stored only in this browser.<br />Please don't reuse a real password.</p>
  </div>

  <script src="app.js"></script>
  <script>
    var mode = "login";
    var $ = function (id) { return document.getElementById(id); };

    // already signed in? go home.
    if (window.LifeHub && LifeHub.session()) location.replace("index.html");

    function setMode(m) {
      mode = m;
      $("tab-login").classList.toggle("active", m === "login");
      $("tab-signup").classList.toggle("active", m === "signup");
      $("name-field").style.display = m === "signup" ? "block" : "none";
      $("submit").textContent = m === "signup" ? "Create account" : "Log in";
      $("password").setAttribute("autocomplete", m === "signup" ? "new-password" : "current-password");
      hide();
    }
    function show(text, ok) { var el = $("msg"); el.textContent = text; el.className = "msg show " + (ok ? "ok" : "err"); }
    function hide() { $("msg").className = "msg"; }

    $("tab-login").addEventListener("click", function () { setMode("login"); });
    $("tab-signup").addEventListener("click", function () { setMode("signup"); });

    $("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      hide();
      $("submit").disabled = true;
      try {
        if (mode === "signup") {
          await LifeHub.signup($("name").value, $("email").value, $("password").value);
          show("Account created! Taking you in…", true);
        } else {
          await LifeHub.login($("email").value, $("password").value);
          show("Welcome back! Loading…", true);
        }
        setTimeout(function () { location.replace("index.html"); }, 500);
      } catch (err) {
        show(err.message, false);
        $("submit").disabled = false;
      }
    });

    setMode("login");
  </script>
</body>
</html>
